<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch 3.0 Block Category Explorer</title>
    <style>
        :root {
            --motion-color: #4C97FF;
            --looks-color: #9966FF;
            --sound-color: #D65DB1;
            --events-color: #FFBF00;
            --control-color: #FFAB19;
            --sensing-color: #4CBFE6;
            --operators-color: #59C059;
            --variables-color: #FF8C1A;
            --lists-color: #FF661A;
            --text-color: #333;
            --bg-color: #f0f0f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        h1 { color: var(--text-color); margin-top: 20px; }
        p.subtitle { font-size: 1.1em; color: #666; margin-bottom: 20px; }

        #explorer-container {
            display: flex;
            width: 95vw;
            height: 80vh;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            overflow: hidden;
        }

        #image-pane {
            flex: 2;
            position: relative;
            /* Using the filename you specified */
            background-image: url('file:///Users/ahgrindstaff/Desktop/scratch_blocks.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            transition: background-color 0.2s;
            /* border: 1px solid rgba(255,0,0,0.2); */ /* Uncomment this to see the boxes */
        }

        .hotspot:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
        }

        /* Adjusted coordinates to match your uploaded image layout */
        #hotspot-motion { top: 5%; left: 2%; width: 10%; height: 90%; }
        #hotspot-looks  { top: 5%; left: 13%; width: 10%; height: 90%; }
        #hotspot-sound  { top: 5%; left: 24%; width: 10%; height: 40%; }
        #hotspot-events { top: 5%; left: 35%; width: 10%; height: 50%; }
        #hotspot-control{ top: 5%; left: 46%; width: 10%; height: 90%; }
        #hotspot-sensing{ top: 5%; left: 56%; width: 11%; height: 90%; }
        #hotspot-operators{ top: 5%; left: 68%; width: 10%; height: 75%; }
        #hotspot-variables{ top: 5%; left: 79%; width: 10%; height: 30%; }
        #hotspot-lists  { top: 5%; left: 89%; width: 10%; height: 60%; }

        #description-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow-y: auto;
            padding: 20px;
            background-color: #fafafa;
        }

        #category-header {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 4px solid #ddd;
        }

        .section-title { font-weight: bold; color: #555; margin-top: 15px; text-transform: uppercase; font-size: 0.9em; }
        #explanation-text, #why-use-text { line-height: 1.6; color: var(--text-color); margin-top: 5px; }

    </style>
</head>
<body>

    <h1>Scratch 3.0 Block Category Explorer</h1>
    <p class="subtitle">Click on a group of blocks to see how they work!</p>

    <div id="explorer-container">
        <div id="image-pane">
            <div id="hotspot-motion" class="hotspot" data-category="motion"></div>
            <div id="hotspot-looks" class="hotspot" data-category="looks"></div>
            <div id="hotspot-sound" class="hotspot" data-category="sound"></div>
            <div id="hotspot-events" class="hotspot" data-category="events"></div>
            <div id="hotspot-control" class="hotspot" data-category="control"></div>
            <div id="hotspot-sensing" class="hotspot" data-category="sensing"></div>
            <div id="hotspot-operators" class="hotspot" data-category="operators"></div>
            <div id="hotspot-variables" class="hotspot" data-category="variables"></div>
            <div id="hotspot-lists" class="hotspot" data-category="lists"></div>
        </div>

        <div id="description-pane">
            <div id="category-header">Select a Block Group</div>
            
            <div class="section-title">What it does:</div>
            <div id="explanation-text">Click any column of blocks on the left to start exploring.</div>

            <div class="section-title">Why use it:</div>
            <div id="why-use-text">The right side will update with tips on when to use these blocks in your games!</div>
        </div>
    </div>

    <script>
        const categoryData = {
            motion: { title: "Motion", color: "#4C97FF", what: "Moves and turns sprites. You can set specific X and Y coordinates or make them glide.", why: "Use this for character movement, jumping, or making a sprite follow the player." },
            looks: { title: "Looks", color: "#9966FF", what: "Changes costumes, size, and visual effects. It also handles 'say' and 'think' bubbles.", why: "Use this for animation, dialogue, and making visual changes like turning a sprite invisible." },
            sound: { title: "Sound", color: "#D65DB1", what: "Plays sounds and music. You can change the pitch and volume.", why: "Great for sound effects (like a jump sound) or background music for your levels." },
            events: { title: "Events", color: "#FFBF00", what: "These are 'Hat' blocks that tell your code when to start (like 'when green flag clicked').", why: "Every script needs an Event block at the top, or it will never run!" },
            control: { title: "Control", color: "#FFAB19", what: "Handles loops (repeat, forever) and 'if-then' logic.", why: "This is the 'brain' of your code. Use it to check for wins/losses or keep things moving forever." },
            sensing: { title: "Sensing", color: "#4CBFE6", what: "Detects touching, colors, mouse position, and keys pressed.", why: "Essential for games! Use this to see if a player hits an enemy or a wall." },
            operators: { title: "Operators", color: "#59C059", what: "Math blocks for adding, subtracting, and comparing numbers.", why: "Use these to calculate scores, check if health is less than zero, or pick random numbers." },
            variables: { title: "Variables", color: "#FF8C1A", what: "Blocks to create and change 'containers' for data like numbers or text.", why: "Use variables to track things that change, like Score, Health, or Time." },
            lists: { title: "Lists", color: "#FF661A", what: "Advanced variables that hold a whole list of items at once.", why: "Perfect for inventories or keeping track of multiple high scores." }
        };

        const hotspots = document.querySelectorAll('.hotspot');
        const header = document.getElementById('category-header');
        const explanationText = document.getElementById('explanation-text');
        const whyUseText = document.getElementById('why-use-text');

        function displayCategory(catName) {
            const data = categoryData[catName];
            if (data) {
                header.textContent = data.title;
                header.style.borderBottomColor = data.color;
                header.style.color = data.color;
                explanationText.innerHTML = data.what;
                whyUseText.innerHTML = data.why;
            }
        }

        hotspots.forEach(hotspot => {
            hotspot.addEventListener('click', (e) => {
                displayCategory(e.target.dataset.category);
            });
        });
    </script>
</body>
</html>
